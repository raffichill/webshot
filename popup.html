<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webshot</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        width: 240px;
        background: #f6f3eb;
        color: #171717;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      p {
        margin: 0 0 12px;
        font-size: 12px;
        line-height: 1.4;
        color: #5f584b;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      button {
        appearance: none;
        border: 1px solid #d8d0c1;
        border-radius: 10px;
        background: #fffdf8;
        color: inherit;
        text-align: left;
        padding: 11px 12px;
        cursor: pointer;
        transition:
          transform 120ms ease,
          border-color 120ms ease,
          background 120ms ease;
      }

      button:hover {
        border-color: #b6ab98;
        background: #fffaf0;
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
        transform: none;
      }

      .label {
        display: block;
        font-size: 13px;
        font-weight: 600;
      }

      .hint {
        display: block;
        margin-top: 3px;
        font-size: 11px;
        color: #6d6557;
      }

      #status {
        min-height: 16px;
        margin-top: 10px;
        font-size: 11px;
        color: #6d6557;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Webshot</h1>
      <p>Copy what’s on screen, or the whole page.</p>
      <div class="actions">
        <button type="button" data-mode="viewport">
          <span class="label">Copy visible viewport</span>
          <span class="hint">What’s on screen right now</span>
        </button>
        <button type="button" data-mode="full-content">
          <span class="label">Copy full page content</span>
          <span class="hint">Grow the page until it no longer scrolls</span>
        </button>
      </div>
      <div id="status" aria-live="polite"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
